# Docker alternative to scripts/dev-infra.sh. Ports and auth match
# .env.example (postgresql://hype@127.0.0.1:54329/hype_machine,
# redis://127.0.0.1:63790) so the copied .env works unchanged.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hype
      POSTGRES_DB: hype_machine
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "54329:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"

volumes:
  pgdata:
